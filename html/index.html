<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Pokémons</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="data/type_effectiveness.js"></script>
    <script src="data/charged_moves.js"></script>
    <script src="data/fast_moves.js"></script>
    <script src="data/pokemons.js"></script>
    <script src="data/pokemon_moves.js"></script>
    <script src="data/pokemon_types.js"></script>
    
    <script src="data/class_type.js"></script>
    <script src="data/class_attack.js"></script>
    <script src="data/class_pokemon.js"></script>
</head>
<body>
    <div id="filters_fields">
        <select id="type"></select>
        <select id="fast_attack"></select>
        <input id="nom" type="text">
    </div>

    <div class="tablecontainer">
        <table>
            <thead>
                <th data-field="id">ID</th>
                <th data-field="name">Nom</th>
                <th data-field="type">Type(s)</th>
                <th data-field="stamina">Endurance</th>
                <th data-field="attack">Attaque</th>
                <th data-field="defense">Défense</th>
                <th>Image</th>
            </thead>

            <tbody>
                <!-- Rempli dynamiquement -->
            </tbody>
        </table>
    </div>

    <div id="details" style="display: none">

    <div>
        <button id="prev" onclick="prevPage()">PRÉC</button>
        <button id="next" onclick="nextPage()">SUIV</button>
        <span id="page"></span>
    </div>
</body>

<script src="js/script.js" defer></script>
</html>
