<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Pokémons</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="data/type_effectiveness.js"></script>
    <script src="data/charged_moves.js"></script>
    <script src="data/fast_moves.js"></script>
    <script src="data/pokemons.js"></script>
    <script src="data/pokemon_moves.js"></script>
    <script src="data/pokemon_types.js"></script>
    
    <script src="data/class_type.js"></script>
    <script src="data/class_attack.js"></script>
    <script src="data/class_pokemon.js"></script>
</head>
<body>
    <h1><img src="webp/images/logo.png"></h1>

    <div id="filters_fields">
        <select id="type"></select>
        <select id="fast_attack"></select>
        <input id="nom" type="text" placeholder="Nom (ex : Pikachu)">
    </div>

    <div class="pages">
        <button class="prev" onclick="prevPage()">PRÉC</button>
        <button class="next" onclick="nextPage()">SUIV</button>
        <span class="page"></span>
    </div>

    <div class="tablecontainer">
        <table>
            <thead>
                <th data-field="id">ID</th>
                <th data-field="name">Nom</th>
                <th data-field="type">Type(s)</th>
                <th data-field="stamina" class="number">Endurance</th>
                <th data-field="attack" class="number">Attaque</th>
                <th data-field="defense" class="number">Défense</th>
                <th>Image</th>
            </thead>
            
            <tbody>
                <!-- Rempli dynamiquement -->
            </tbody>
        </table>
        
        <div id="infos" style="display: none"></div>
        <div id="image-zoom"></div>
    </div>
    

    <div class="pages">
        <button class="prev" onclick="prevPage()">PRÉC</button>
        <button class="next" onclick="nextPage()">SUIV</button>
        <span class="page"></span>
    </div>
</body>

<script src="js/script.js" defer></script>
</html>
